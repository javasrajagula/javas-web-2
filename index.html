<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>javascdih</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    background: radial-gradient(circle at bottom, #0b132b, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
    position: fixed;
    inset: 0;
  }

  .stars {
    position: absolute;
    inset: 0;
    width: 200%;
    height: 200%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 80s linear infinite;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes moveStars {
    from { transform: translateY(0); }
    to { transform: translateY(-600px); }
  }

  .image {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 24px;
    box-shadow: 0 0 30px rgba(173,216,230,0.25);
    z-index: 1;
    display: block;
  }

  .text {
    position: relative;
    font-size: clamp(1rem, 4.5vw, 2rem);
    border-right: 3px solid white;
    padding-right: 5px;
    white-space: nowrap;
    overflow: hidden;
    animation: blink 0.8s infinite;
    text-shadow:
      0 0 5px rgba(255,255,255,0.3),
      0 0 20px rgba(173,216,230,0.4);
    z-index: 1;
    max-width: 90vw;
  }

  @keyframes blink {
    50% { border-color: transparent; }
  }

  .for-r {
    margin-top: 16px;
    font-size: clamp(0.7rem, 3vw, 1rem);
    letter-spacing: 4px;
    color: rgba(173, 216, 230, 0.7);
    z-index: 1;
    font-style: italic;
  }
</style>
</head>

<body>

<div class="stars"></div>

<img
  src="https://mysitus.vercel.app/kaguya.jpg"
  class="image"
  alt="kaguya"
  onerror="this.src='https://i.imgur.com/Ho4R7Ph.jpeg'"
>

<div class="text" id="typing"></div>
<div class="for-r">for R</div>

<script>
  const text = "maybe in another universe";
  const el = document.getElementById("typing");
  let charIndex = 0;
  let isDeleting = false;

  function typeLoop() {
    if (!isDeleting) {
      el.textContent = text.substring(0, charIndex++);
      if (charIndex > text.length) {
        isDeleting = true;
        setTimeout(typeLoop, 1500);
        return;
      }
    } else {
      el.textContent = text.substring(0, charIndex--);
      if (charIndex < 0) {
        isDeleting = false;
        setTimeout(typeLoop, 300);
        return;
      }
    }
    setTimeout(typeLoop, isDeleting ? 40 : 70);
  }

  typeLoop();
</script>

</body>
</html>
